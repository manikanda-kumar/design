<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components — Transaction row</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="padding: 20px;">
  <div class="label" style="margin-bottom: 12px;">Transaction row</div>
  <div style="background:#fff; border-radius: 18px; box-shadow: var(--shadow-2); overflow: hidden;">
    <div style="display:flex; align-items:center; gap: 14px; padding: 14px 18px; border-bottom: 1px solid var(--ink-100);">
      <div style="width: 40px; height: 40px; border-radius: 999px; background: var(--mint-100); display:flex; align-items:center; justify-content:center; color: var(--mint-700);">
        <svg width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" viewBox="0 0 24 24"><path d="M12 5v14M5 12l7-7 7 7"/></svg>
      </div>
      <div style="flex: 1;">
        <div style="font-weight: 500; font-size: 15px;">Payroll · Acme Co.</div>
        <div style="font-size: 12px; color: var(--fg-secondary);">Direct deposit · Today, 9:14 AM</div>
      </div>
      <div style="text-align: right;">
        <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--mint-700); font-weight: 500; font-size: 15px;">+ $3,240.00</div>
        <div style="font-size: 11px; color: var(--fg-tertiary);">Checking · 4218</div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap: 14px; padding: 14px 18px;">
      <div style="width: 40px; height: 40px; border-radius: 999px; background: var(--ink-100); display:flex; align-items:center; justify-content:center; color: var(--ink-700);">
        <svg width="20" height="20" stroke="currentColor" stroke-width="2" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 12h6M12 9v6"/></svg>
      </div>
      <div style="flex: 1;">
        <div style="font-weight: 500; font-size: 15px;">Whole Foods Market</div>
        <div style="font-size: 12px; color: var(--fg-secondary);">Groceries · Yesterday</div>
      </div>
      <div style="text-align: right;">
        <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--coral-700); font-weight: 500; font-size: 15px;">— $42.18</div>
        <div style="font-size: 11px; color: var(--fg-tertiary);">Debit · 4218</div>
      </div>
    </div>
  </div>
</div>
</body></html>
