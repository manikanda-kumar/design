<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — In context</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card" style="padding: 20px;">
  <div class="label" style="margin-bottom: 12px;">Color in context — a transaction list</div>
  <div style="background: #fff; border-radius: 18px; padding: 16px 20px; box-shadow: 0 4px 10px rgba(14,20,17,0.05), 0 1px 2px rgba(14,20,17,0.04);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom: 1px solid #DFE3DE;">
      <div>
        <div style="font-weight: 500;">Payroll · Acme Co.</div>
        <div style="font-size: 12px; color: var(--fg-secondary);">Today · 9:14 AM</div>
      </div>
      <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--mint-700); font-weight: 500;">+ $3,240.00</div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 10px 0; border-bottom: 1px solid #DFE3DE;">
      <div>
        <div style="font-weight: 500;">Whole Foods</div>
        <div style="font-size: 12px; color: var(--fg-secondary);">Yesterday</div>
      </div>
      <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--coral-700); font-weight: 500;">— $42.18</div>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; padding: 10px 0;">
      <div>
        <div style="font-weight: 500;">Wire to Sarah <span style="background:#FBEFD2; color:#A66B0A; font-size: 10px; padding: 2px 6px; border-radius: 999px; margin-left: 4px; letter-spacing: 0.05em; text-transform: uppercase; font-weight: 500;">Pending</span></div>
        <div style="font-size: 12px; color: var(--fg-secondary);">Clears in ~2 days</div>
      </div>
      <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; color: var(--amber-700); font-weight: 500;">— $250.00</div>
    </div>
  </div>
</div>
</body></html>
