<html lang="en">
<head>

</head>

<div class="card">

  <div style="display:flex; gap:24px; margin-top:22px; flex-wrap:wrap;">
    <div class="token"><div class="token-name">family</div><div class="token-value">Geist</div></div>
    <div class="token"><div class="token-name">weights</div><div class="token-value">400 / 500 / 600 / 700</div></div>
    <div class="token"><div class="token-name">usage</div><div class="token-value">all product UI</div></div>
