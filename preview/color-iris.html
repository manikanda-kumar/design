<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Iris (AI)</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 12px;">Iris · reserved for AI moments</div>
  <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap: 8px; max-width: 60%;">
    <div><div class="swatch" style="background:#E7E4FA; height:64px;"></div><div class="token-name" style="margin-top:6px;">100</div></div>
    <div><div class="swatch" style="background:#B5AEF1; height:64px;"></div><div class="token-name" style="margin-top:6px;">300</div></div>
    <div><div class="swatch" style="background:#6A5EE3; height:64px;"></div><div class="token-name" style="margin-top:6px; font-weight: 600;">500 ★</div></div>
    <div><div class="swatch" style="background:#4A3FB8; height:64px;"></div><div class="token-name" style="margin-top:6px;">700</div></div>
  </div>
  <div style="margin-top: 18px; padding: 14px 16px; background: #E7E4FA; border-radius: 12px; display: flex; align-items: center; gap: 10px;">
    <span class="ai-badge" style="background:#fff; color:#4A3FB8;">AI · suggested</span>
    <div style="font-size: 14px; color: #2A322E;">You spent ~18% more on groceries this month.</div>
  </div>
  <div class="caption" style="margin-top:12px;">Iris is contractually reserved for AI surfaces. Don't use it for buttons, links, or accents elsewhere.</div>
</div>
</body></html>
