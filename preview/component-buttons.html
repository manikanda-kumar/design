<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components — Buttons</title>
<link rel="stylesheet" href="_base.css">
<style>
  .btn { font-family: var(--font-sans); font-size: 15px; font-weight: 500; padding: 12px 20px; border-radius: 12px; border: none; cursor: pointer; transition: all 120ms var(--ease-out); display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary { background: var(--forest-700); color: var(--paper-50); }
  .btn-primary:hover { background: var(--forest-800); }
  .btn-secondary { background: var(--paper-0); color: var(--ink-900); box-shadow: inset 0 0 0 1px var(--ink-200); }
  .btn-secondary:hover { background: var(--paper-200); }
  .btn-ghost { background: transparent; color: var(--forest-700); padding: 12px 12px; }
  .btn-ghost:hover { background: var(--forest-50); }
  .btn-danger { background: var(--coral-500); color: white; }
  .btn-ai { background: var(--iris-500); color: white; }
  .btn-sm { font-size: 13px; padding: 8px 14px; border-radius: 10px; }
  .btn-pill { border-radius: 999px; padding: 10px 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 14px;">Buttons</div>
  <div style="display:flex; flex-wrap: wrap; gap: 10px; align-items: center;">
    <button class="btn btn-primary">Move money</button>
    <button class="btn btn-secondary">Cancel</button>
    <button class="btn btn-ghost">Skip for now</button>
    <button class="btn btn-danger">Close account</button>
    <button class="btn btn-ai">✦ Ask Cove</button>
  </div>
  <div style="display:flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 12px;">
    <button class="btn btn-primary btn-sm">Send</button>
    <button class="btn btn-secondary btn-sm">Edit</button>
    <button class="btn btn-primary btn-pill">Get started →</button>
    <button class="btn btn-secondary btn-pill">Learn more</button>
  </div>
  <div class="caption" style="margin-top: 12px;">All buttons shrink to scale(0.97) on press · 120ms ease-out.</div>
</div>
</body></html>
