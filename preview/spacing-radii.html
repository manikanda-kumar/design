    <div style="text-align: center;"><div style="width:64px; height:64px; background:#fff; border-radius: 999px; box-shadow: var(--shadow-2);"></div><div class="token-name" style="margin-top:8px;">pill</div><div class="token-value">999</div></div>
  </div>
