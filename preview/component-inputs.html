<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Components — Inputs</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 14px;">Form inputs</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 14px;">
    <div>
      <div style="font-size: 12px; color: var(--fg-secondary); margin-bottom: 6px; font-weight: 500;">Recipient</div>
      <input value="Sarah Chen" style="width: 100%; font: inherit; font-size: 15px; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--ink-200); background: white; box-shadow: var(--shadow-inset);">
    </div>
    <div>
      <div style="font-size: 12px; color: var(--fg-secondary); margin-bottom: 6px; font-weight: 500;">Amount</div>
      <input value="$240.00" style="width: 100%; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 15px; padding: 12px 14px; border-radius: 12px; border: 2px solid var(--forest-700); background: white; outline: none;">
    </div>
    <div>
      <div style="font-size: 12px; color: var(--fg-secondary); margin-bottom: 6px; font-weight: 500;">Memo <span style="color: var(--fg-tertiary); font-weight: 400;">(optional)</span></div>
      <input placeholder="Dinner Tuesday — thanks!" style="width: 100%; font: inherit; font-size: 15px; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--ink-200); background: white;">
    </div>
    <div>
      <div style="font-size: 12px; color: var(--fg-secondary); margin-bottom: 6px; font-weight: 500;">Routing number</div>
      <input value="021000089" style="width: 100%; font-family: var(--font-mono); font-size: 15px; padding: 12px 14px; border-radius: 12px; border: 1px solid var(--coral-500); background: #FBE3DC; color: var(--coral-700);">
      <div style="font-size: 12px; color: var(--coral-700); margin-top: 4px;">This routing number doesn't match a US bank.</div>
    </div>
  </div>
</div>
</body></html>
