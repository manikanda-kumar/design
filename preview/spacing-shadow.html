<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing — Shadow</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 18px;">Elevation · 4-step soft shadow + inset</div>
  <div style="display:grid; grid-template-columns: repeat(5, 1fr); gap: 16px; padding: 8px 4px 24px;">
    <div style="text-align:center;">
      <div style="width:88px; height:64px; margin:0 auto; background:#fff; border-radius:12px; box-shadow: 0 1px 2px rgba(14, 20, 17, 0.04), 0 1px 1px rgba(14, 20, 17, 0.03);"></div>
      <div class="token-name" style="margin-top:14px;">shadow-1</div>
      <div class="token-value">list row hover</div>
    </div>
    <div style="text-align:center;">
      <div style="width:88px; height:64px; margin:0 auto; background:#fff; border-radius:12px; box-shadow: 0 4px 10px rgba(14, 20, 17, 0.05), 0 1px 2px rgba(14, 20, 17, 0.04);"></div>
      <div class="token-name" style="margin-top:14px;">shadow-2 ★</div>
      <div class="token-value">default card</div>
    </div>
    <div style="text-align:center;">
      <div style="width:88px; height:64px; margin:0 auto; background:#fff; border-radius:12px; box-shadow: 0 12px 32px rgba(14, 20, 17, 0.08), 0 2px 6px rgba(14, 20, 17, 0.04);"></div>
      <div class="token-name" style="margin-top:14px;">shadow-3</div>
      <div class="token-value">modal · sheet</div>
    </div>
    <div style="text-align:center;">
      <div style="width:88px; height:64px; margin:0 auto; background:#fff; border-radius:12px; box-shadow: 0 24px 60px rgba(14, 20, 17, 0.12), 0 4px 10px rgba(14, 20, 17, 0.05);"></div>
      <div class="token-name" style="margin-top:14px;">shadow-4</div>
      <div class="token-value">dragged</div>
    </div>
    <div style="text-align:center;">
      <div style="width:88px; height:64px; margin:0 auto; background:#F5F2EA; border-radius:12px; box-shadow: inset 0 1px 2px rgba(14, 20, 17, 0.06);"></div>
      <div class="token-name" style="margin-top:14px;">inset</div>
      <div class="token-value">sunken input</div>
    </div>
  </div>
</div>
</body></html>
