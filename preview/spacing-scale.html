<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Spacing — Scale</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">

    <div style="text-align:center;"><div style="height: 16px; width: 16px; background: var(--forest-700);"></div><div class="token-name" style="margin-top:6px;">4</div><div class="token-value">16</div></div>

    <div style="text-align:center;"><div style="height: 48px; width: 48px; background: var(--forest-700);"></div><div class="token-name" style="margin-top:6px;">12</div><div class="token-value">48</div></div>
    <div style="text-align:center;"><div style="height: 64px; width: 64px; background: var(--forest-700);"></div><div class="token-name" style="margin-top:6px;">16</div><div class="token-value">64</div></div>
  </div>
</div>
