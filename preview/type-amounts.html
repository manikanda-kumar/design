<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Amounts</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 16px;">Money treatment · serif hero vs. mono row</div>
  <div style="display:flex; gap:48px; align-items:flex-end; flex-wrap:wrap;">
    <div>
      <div style="font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 4px;">Available</div>
      <div style="font-family: var(--font-display); font-feature-settings: 'lnum','tnum'; font-variant-numeric: tabular-nums; font-size: 56px; letter-spacing: -0.025em; line-height: 1; color: var(--ink-900);">$8,420<span style="color:var(--fg-tertiary); font-size: 36px;">.50</span></div>
    </div>
    <div>
      <div style="font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-tertiary); margin-bottom: 4px;">Row · mono</div>
      <div style="font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 18px;">
        <div style="color: var(--mint-700);">+ $1,200.00</div>
        <div style="color: var(--coral-700);">— $42.18</div>
        <div style="color: var(--ink-900);">$1,000.00</div>
      </div>
    </div>
  </div>
</div>
</body></html>
