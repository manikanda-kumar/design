<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand — Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
  .ico { display:flex; flex-direction: column; align-items:center; gap: 6px; padding: 12px 0; }
  .ico svg { stroke: var(--ink-900); }
  .ico .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-tertiary); }
</style>
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 14px;">Iconography · Lucide @ 1.5 stroke, 24px</div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap: 6px;">
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg><span class="name">home</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 7h13l-4-4M21 17H8l4 4"/></svg><span class="name">swap</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2"/><path d="M2 11h20"/></svg><span class="name">card</span></div>
    <div class="ico" style="color: var(--iris-700);"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 3l1.8 5.7L19.5 10l-5.7 1.3L12 17l-1.8-5.7L4.5 10l5.7-1.3z"/></svg><span class="name">sparkles</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg><span class="name">user</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M12 5v14"/></svg><span class="name">plus</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg><span class="name">arrow-right</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-5-5"/></svg><span class="name">search</span></div>
    <div class="ico" style="color: var(--mint-700);"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/></svg><span class="name">check</span></div>
    <div class="ico" style="color: var(--amber-700);"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><span class="name">clock</span></div>
    <div class="ico" style="color: var(--coral-700);"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M12 3L2 20h20z"/><path d="M12 10v4M12 17h.01"/></svg><span class="name">alert</span></div>
    <div class="ico" style="color: var(--mint-700);"><svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8M14 7h7v7"/></svg><span class="name">trend-up</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01"/></svg><span class="name">info</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21 12a9 9 0 1 1-3-6.7M17 4v5h-5"/></svg><span class="name">repeat</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg><span class="name">qr</span></div>
    <div class="ico"><svg width="24" height="24" fill="none" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v9l5 5"/></svg><span class="name">pie</span></div>
  </div>
</div>
</body></html>
