<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Semantic</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 12px;">Semantic · positive · negative · pending</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px;">
    <div>
      <div style="display:flex; gap:4px;">
        <div class="swatch" style="background:#DFF5EA; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#8FE0BD; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#2FB87F; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#1F8E5B; height:48px; flex:1;"></div>
      </div>
      <div style="font-weight: 600; margin-top: 8px; color: var(--mint-700);">Mint · positive</div>
      <div class="token-value">inflows · success · APY</div>
    </div>
    <div>
      <div style="display:flex; gap:4px;">
        <div class="swatch" style="background:#FBE3DC; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#F4A892; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#E8654A; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#B33A23; height:48px; flex:1;"></div>
      </div>
      <div style="font-weight: 600; margin-top: 8px; color: var(--coral-700);">Coral · negative</div>
      <div class="token-value">outflows · alerts (not red)</div>
    </div>
    <div>
      <div style="display:flex; gap:4px;">
        <div class="swatch" style="background:#FBEFD2; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#EFC678; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#D99416; height:48px; flex:1;"></div>
        <div class="swatch" style="background:#A66B0A; height:48px; flex:1;"></div>
      </div>
      <div style="font-weight: 600; margin-top: 8px; color: var(--amber-700);">Amber · pending</div>
      <div class="token-value">in-flight · awaiting</div>
    </div>
  </div>
</div>
</body></html>
