<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Mono</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 16px;">Geist Mono · Tabular numerics</div>
  <table style="border-collapse:collapse; font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 16px; width: 100%;">
    <tr><td style="padding:6px 0; color: var(--fg-secondary);">Whole Foods</td>            <td style="text-align:right; color: var(--coral-700);">— $42.18</td></tr>
    <tr><td style="padding:6px 0; color: var(--fg-secondary);">Payroll · Acme Co.</td>      <td style="text-align:right; color: var(--mint-700);">+ $3,240.00</td></tr>
    <tr><td style="padding:6px 0; color: var(--fg-secondary);">Spotify</td>                 <td style="text-align:right; color: var(--coral-700);">— $11.99</td></tr>
    <tr><td style="padding:6px 0; color: var(--fg-secondary);">Transfer · Savings</td>      <td style="text-align:right; color: var(--ink-900);">$1,000.00</td></tr>
  </table>
  <div style="display:flex; gap:24px; margin-top:16px; flex-wrap:wrap;">
    <div class="token"><div class="token-name">family</div><div class="token-value">Geist Mono</div></div>
    <div class="token"><div class="token-name">features</div><div class="token-value">tnum, zero, lnum</div></div>
    <div class="token"><div class="token-name">usage</div><div class="token-value">amounts · IDs · code</div></div>
  </div>
</div>
</body></html>
