<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — Neutrals</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 12px;">Ink (text) · 8 steps</div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap: 8px;">
    <div><div class="swatch" style="background:#ECEEE9; height:48px;"></div><div class="token-name" style="margin-top:4px;">100</div></div>
    <div><div class="swatch" style="background:#DFE3DE; height:48px;"></div><div class="token-name" style="margin-top:4px;">200</div></div>
    <div><div class="swatch" style="background:#BDC4BF; height:48px;"></div><div class="token-name" style="margin-top:4px;">300</div></div>
    <div><div class="swatch" style="background:#8A938E; height:48px;"></div><div class="token-name" style="margin-top:4px;">400</div></div>
    <div><div class="swatch" style="background:#5B6560; height:48px;"></div><div class="token-name" style="margin-top:4px;">500</div></div>
    <div><div class="swatch" style="background:#2A322E; height:48px;"></div><div class="token-name" style="margin-top:4px;">700</div></div>
    <div><div class="swatch" style="background:#0E1411; height:48px;"></div><div class="token-name" style="margin-top:4px;">900</div></div>
    <div></div>
  </div>
  <div class="label" style="margin-top: 18px; margin-bottom: 10px;">Paper (surfaces)</div>
  <div style="display:grid; grid-template-columns: repeat(8, 1fr); gap: 8px;">
    <div><div class="swatch" style="background:#FFFFFF; height:48px;"></div><div class="token-name" style="margin-top:4px;">0</div></div>
    <div><div class="swatch" style="background:#FBFAF6; height:48px;"></div><div class="token-name" style="margin-top:4px;">50</div></div>
    <div><div class="swatch" style="background:#F5F2EA; height:48px;"></div><div class="token-name" style="margin-top:4px; font-weight:600;">100 ★</div></div>
    <div><div class="swatch" style="background:#EDE9DD; height:48px;"></div><div class="token-name" style="margin-top:4px;">200</div></div>
    <div><div class="swatch" style="background:#E2DCCB; height:48px;"></div><div class="token-name" style="margin-top:4px;">300</div></div>
  </div>
  <div class="caption" style="margin-top:12px;">★ Paper-100 is the canvas. Pure white (Paper-0) is for cards floating on it.</div>
</div>
</body></html>
