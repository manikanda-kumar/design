<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Scale</title>
<link rel="stylesheet" href="_base.css">
</head>
<body>
<div class="card">
  <div class="label" style="margin-bottom: 16px;">Type scale</div>
  <div style="display:grid; grid-template-columns: 80px 1fr; gap: 6px 16px; align-items: baseline;">
    <div class="token-name">72</div><div style="font-family: var(--font-display); font-size: 72px; line-height: 1; letter-spacing: -0.025em;">Aa</div>
    <div class="token-name">40</div><div style="font-family: var(--font-display); font-size: 40px; line-height: 1.05; letter-spacing: -0.02em;">Display</div>
    <div class="token-name">28</div><div style="font-size: 28px; font-weight: 600; line-height: 1.2; letter-spacing: -0.01em;">H1 — Spending</div>
    <div class="token-name">22</div><div style="font-size: 22px; font-weight: 600;">H2 — Recent activity</div>
    <div class="token-name">17</div><div style="font-size: 17px;">Body lg — primary content</div>
    <div class="token-name">15</div><div style="font-size: 15px;">Body — the default</div>
    <div class="token-name">13</div><div style="font-size: 13px; color: var(--fg-secondary);">Body sm — meta lines, captions</div>
    <div class="token-name">11</div><div style="font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--fg-tertiary);">Micro · eyebrow label</div>
  </div>
</div>
</body></html>
